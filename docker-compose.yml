services:
  app-dev:
    build:
      dockerfile: Dockerfile
      context: .
      # Only will build development stage from our dockerfile
      target: development
    volumes:
      - .:/home/go/sourcecode
      - ~/.ssh:/home/go/.ssh:ro
    depends_on:
      - oracle-db
    networks:
      - backend
    ports:
      - 6464:6464
      - 6565:6565
      - 6767:6767
    command: godoc -http=:6464
  app-prod:
    build:
      dockerfile: Dockerfile
      context: .
      # Only will build production stage from our dockerfile
      target: production
    ports:
      - 6000:6000
    networks:
      - backend
  oracle-db:
    image: oracleinanutshell/oracle-xe-11g:1.0.0
    ports:
      - 1521:1521
      - 5500:5500
    networks:
      - backend
networks:
  backend:
    driver: bridge
